name: "Setup LLVM (prebuilt release)"
description: >
  Download, verify (sha256), extract and expose an official prebuilt LLVM
  release toolchain — clang, opt, the CMake package, headers and static libs —
  for the current platform. The downloaded archive is cached by version so
  repeat runs skip the (already fast) download entirely.

inputs:
  llvm-version:
    description: "LLVM release version, i.e. the llvmorg-<version> tag (e.g. 22.1.8)."
    required: true
  cache-version:
    description: "Bump to invalidate every cached LLVM archive."
    required: false
    default: "v1"

outputs:
  install-prefix:
    description: "Absolute path to the extracted LLVM toolchain."
    value: ${{ steps.vars.outputs.prefix }}
  llvm-dir:
    description: "Path to lib/cmake/llvm (for -DLLVM_DIR)."
    value: ${{ steps.vars.outputs.llvm_dir }}
  clang:
    description: "Path to the clang driver."
    value: ${{ steps.vars.outputs.clang }}
  clangxx:
    description: "Path to the clang++ driver."
    value: ${{ steps.vars.outputs.clangxx }}
  cache-hit:
    description: "Whether the LLVM archive was restored from cache."
    value: ${{ steps.cache.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Resolve asset + paths
      id: vars
      shell: bash
      run: |
        set -euo pipefail
        ver="${{ inputs.llvm-version }}"
        prefix="${RUNNER_TEMP//\\//}/llvm"
        tarball="${RUNNER_TEMP//\\//}/llvm-${ver}.tar.xz"
        case "${RUNNER_OS}-${RUNNER_ARCH}" in
          Linux-X64)   asset="LLVM-${ver}-Linux-X64.tar.xz" ;;
          Linux-ARM64) asset="LLVM-${ver}-Linux-ARM64.tar.xz" ;;
          macOS-ARM64) asset="LLVM-${ver}-macOS-ARM64.tar.xz" ;;
          Windows-X64) asset="clang+llvm-${ver}-x86_64-pc-windows-msvc.tar.xz" ;;
          *) echo "::error::no prebuilt LLVM mapping for ${RUNNER_OS}-${RUNNER_ARCH}"; exit 1 ;;
        esac
        {
          echo "prefix=$prefix"
          echo "tarball=$tarball"
          echo "asset=$asset"
          echo "llvm_dir=$prefix/lib/cmake/llvm"
        } >> "$GITHUB_OUTPUT"
        if [ "$RUNNER_OS" = "Windows" ]; then
          echo "clang=$prefix/bin/clang.exe"    >> "$GITHUB_OUTPUT"
          echo "clangxx=$prefix/bin/clang++.exe" >> "$GITHUB_OUTPUT"
        else
          echo "clang=$prefix/bin/clang"    >> "$GITHUB_OUTPUT"
          echo "clangxx=$prefix/bin/clang++" >> "$GITHUB_OUTPUT"
        fi

    - name: Cache LLVM archive
      id: cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.vars.outputs.tarball }}
        key: llvm-prebuilt-${{ runner.os }}-${{ runner.arch }}-${{ inputs.cache-version }}-${{ inputs.llvm-version }}

    - name: Download + verify LLVM (cache miss)
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        VER: ${{ inputs.llvm-version }}
        ASSET: ${{ steps.vars.outputs.asset }}
        TARBALL: ${{ steps.vars.outputs.tarball }}
      run: |
        set -euo pipefail
        # Authoritative sha256 straight from the release asset metadata.
        digest="$(gh api "repos/llvm/llvm-project/releases/tags/llvmorg-${VER}" \
          --jq ".assets[] | select(.name==\"${ASSET}\") | .digest" || true)"
        digest="${digest#sha256:}"
        if [ -z "$digest" ]; then
          echo "::error::could not resolve sha256 digest for ${ASSET} (llvmorg-${VER})"; exit 1
        fi
        url="https://github.com/llvm/llvm-project/releases/download/llvmorg-${VER}/${ASSET}"
        echo "Downloading ${url}"
        curl -fSL --retry 5 --retry-delay 5 -o "$TARBALL" "$url"
        echo "Verifying sha256 ${digest}"
        if command -v sha256sum >/dev/null 2>&1; then
          echo "${digest}  ${TARBALL}" | sha256sum -c -
        else
          echo "${digest}  ${TARBALL}" | shasum -a 256 -c -
        fi

    - name: Extract LLVM
      shell: bash
      env:
        PREFIX: ${{ steps.vars.outputs.prefix }}
        TARBALL: ${{ steps.vars.outputs.tarball }}
      run: |
        set -euo pipefail
        rm -rf "$PREFIX"
        mkdir -p "$PREFIX"
        # Every release archive nests everything under a single top directory.
        if [ "$RUNNER_OS" = "Windows" ]; then
          # git-bash's GNU tar treats the "D:" drive as a remote host and has no
          # bundled xz; the Windows system bsdtar handles drive paths and .xz.
          if [ -x /c/Windows/System32/tar.exe ]; then
            /c/Windows/System32/tar.exe -xf "$TARBALL" -C "$PREFIX" --strip-components=1
          else
            tar --force-local -xf "$TARBALL" -C "$PREFIX" --strip-components=1
          fi
        else
          tar -xf "$TARBALL" -C "$PREFIX" --strip-components=1
        fi
        if [ ! -f "$PREFIX/lib/cmake/llvm/LLVMConfig.cmake" ]; then
          echo "::error::extracted toolchain is missing the CMake package"; ls -la "$PREFIX"; exit 1
        fi

    - name: Export toolchain to environment
      shell: bash
      run: |
        set -euo pipefail
        echo "${{ steps.vars.outputs.prefix }}/bin" >> "$GITHUB_PATH"
        echo "LLVM_DIR=${{ steps.vars.outputs.llvm_dir }}" >> "$GITHUB_ENV"
        "${{ steps.vars.outputs.clang }}" --version
